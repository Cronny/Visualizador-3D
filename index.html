<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8" />
        <title>Visualizador 3D</title>
        <link rel="stylesheet" href="css/style.css" type="text/css">
        <script type="text/javascript" src="src/Lector.js"></script>
        <script type="text/javascript" src="src/Vector3.js"></script>
        <script type="text/javascript" src="src/Vector4.js"></script>
        <script type="text/javascript" src ="src/Matrix4.js"></script>
        <script type="text/javascript" src="src/Matrix3.js"></script>
        <script type="text/javascript" src="src/main.js"></script>
    </head>

    <body>
        <div id="main" align="center">
            <div id="encabezado"> 
                <div class="shadow-dance-container">
                    <h1 class="shadow-dance-text">Visualizador 3D</h1>
                </div>
                Carga un archivo .obj (o elije uno de los ejemplos) para visualizarlo en 3D.<br>
                Puedes modificar la posición de la cámara ingresando las coordenadas X, Y y Z.
            </div>

            <div id="carga-archivo"> 
                <input type="file" id="file_input"/>
            </div>

            <div id="ejemplos">
                <button class="ejemplo-btn" data-src="Ejemplos/al.obj">Al</button>
                <button class="ejemplo-btn" data-src="Ejemplos/bottle.obj">Botella</button>
                <button class="ejemplo-btn" data-src="Ejemplos/cat.obj">Gato</button>
                <button class="ejemplo-btn" data-src="Ejemplos/skyscraper.obj">Rascacielos</button>
                <button class="ejemplo-btn" data-src="Ejemplos/sandal.obj">Sandalia</button>
            </div>

            <div id="acciones-obj">
                <button id="toggle_obj_btn">Mostrar .obj</button>
            </div>

            <div id="visor-obj">
                <pre id="obj_text_panel" hidden>Aun no se ha cargado ningun .obj.</pre>
                <canvas id="the_canvas" width="640" height="480"></canvas>
            </div>

            <div id="camara">
                <h3>Cámara:</h3>
                <input type="number" id="camX" placeholder="X">
                <input type="number" id="camY" placeholder="Y">
                <input type="number" id="camZ" placeholder="Z">
            </div>
        </div>
        
    </body>

</html>
